server {
    listen 80;
    server_name localhost;

    # Thư mục chứa các file tĩnh đã được Vite build ra
    root /usr/share/nginx/html;
    index index.html;

    # Bật nén Gzip để giảm dung lượng file khi tải qua mạng
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Xử lý Client-side Routing (SPA - Navigo)
    # Bất kỳ URL nào không tìm thấy file thực tế sẽ trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình cache cho các tài nguyên tĩnh (JS, CSS, Ảnh)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # (Tùy chọn) Proxy các request API sang Backend Python nếu bạn chạy chung mạng Docker
    # location /api/ {
    #     proxy_pass http://backend:8000; # Thay "backend" bằng tên service Docker của bạn
    # }
}