server {
    listen 80;
    server_name localhost;

    # Thư mục chứa các file tĩnh đã được Vite build ra
    root /usr/share/nginx/html;
    index index.html;

    # Bật nén Gzip để giảm dung lượng file khi tải qua mạng
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Xử lý Client-side Routing (SPA - Navigo)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cấu hình cache cho các tài nguyên tĩnh (Tạm thời tắt để debug)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Proxy các request API sang Backend Python chạy chung mạng Docker
    location /api/ {
        proxy_pass http://api:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}