<div class="page" id="page-history" x-data="{ lang: 'vi' }" @kp-lang-changed.window="lang = $event.detail">
    <div class="connectors-content">
        <div class="page-intro">
            <div>
                <div class="intro-kicker">Archive</div>
                <div class="intro-title" x-text="$t('nav.history')">Chat History</div>
                <div class="intro-sub" x-text="$t('history.intro_sub', { defaultValue: 'Xem lại các phiên thảo luận và truy vấn AI trước đây.' })">Xem lại các phiên thảo luận và truy vấn AI trước đây.</div>
            </div>
        </div>
        <div style="padding: 0 20px;">
            <div class="connector-card-rich" style="padding:0">
                <div class="chat-history-list" id="chatHistoryListStandalone" style="max-height: none; overflow: visible;">
                    <div style="padding: 40px; text-align: center; color: var(--text-muted);" x-text="$t('history.loading', { defaultValue: 'Đang tải lịch sử...' })">Đang tải lịch sử...</div>
                </div>
            </div>
        </div>
    </div>
</div>
