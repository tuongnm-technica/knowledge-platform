<!-- ── CONTEXT BASKET DRAWER (REFAC) ── -->
<div id="basketOverlay" class="basket-overlay" style="display: none;"></div>
<div id="basketDrawer" class="basket-drawer">
  <div class="basket-header">
    <div>
      <div class="basket-title">Giỏ Ngữ Cảnh</div>
      <div id="basketCount" class="basket-sub">0 items</div>
    </div>
    <div class="basket-header-actions">
      <button id="basket-clear-all" class="secondary-btn mini">Xóa</button>
      <button id="basketClose" class="secondary-btn mini">Đóng</button>
    </div>
  </div>
  <div class="basket-token">
    <div class="basket-token-row">
      <div class="basket-token-label">Dung lượng não AI</div>
      <div id="tokenVal" class="basket-token-value">0</div> <div class="basket-token-value">/ 32,000</div>
    </div>
    <div class="basket-progress">
      <div id="tokenBar" class="basket-progress-fill" style="width: 0%"></div>
    </div>
  </div>
  <div id="basketItems" class="basket-list">
    <div class="basket-empty">Chưa có item nào. Hãy bấm 📌 để ghim ngữ cảnh.</div>
  </div>
  <div class="basket-actions">
    <button class="secondary-btn">Refresh</button>
    <button id="basket-run-skill" class="primary-btn">🚀 Chạy Skill</button>
  </div>
</div>
<button id="basketFab" class="basket-fab" title="Giỏ ngữ cảnh">
  📌
  <span id="basketFabCount" class="basket-badge" style="display: none;">0</span>
</button>
