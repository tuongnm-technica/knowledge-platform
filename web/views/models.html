<!-- MODELS MANAGEMENT -->
<section id="page-models" class="page-content" style="display: none;">
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Quản lý AI Models</h1>
      <p class="page-subtitle">Cấu hình các nhà cung cấp LLM và gán model cho từng nhiệm vụ hệ thống.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="addModelBtn">
        <span class="btn-icon">+</span> Thêm Model Mới
      </button>
    </div>
  </div>

  <!-- Task Bindings Grid -->
  <div class="section-container">
    <h2 class="section-title">Gán Model theo Tác vụ</h2>
    <div class="bindings-grid" id="bindingsGrid">
      <!-- Generated by models_page.ts -->
      <div class="binding-skeleton">Đang tải cấu hình...</div>
    </div>
  </div>

  <!-- Models List -->
  <div class="section-container">
    <div class="section-header">
      <h2 class="section-title">Danh sách Registry</h2>
      <div class="models-filter">
        <span class="filter-label">Lọc theo provider:</span>
        <select id="providerFilter" class="form-select sm">
          <option value="all">Tất cả</option>
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="ollama">Ollama (On-Prem)</option>
          <option value="vllm">vLLM / Custom</option>
        </select>
      </div>
    </div>
    
    <div class="models-grid" id="modelsGrid">
      <!-- Generated by models_page.ts -->
      <div class="empty-state">
        <div class="empty-icon">🤖</div>
        <h3>Chưa có model nào được cấu hình</h3>
        <p>Thêm model đầu tiên để bắt đầu sử dụng các tính năng AI.</p>
      </div>
    </div>
  </div>

  <!-- Add/Edit Model Modal -->
  <div class="modal-overlay" id="modelModal" style="display: none;">
    <div class="modal-content premium-card">
      <div class="modal-header">
        <h2 id="modalTitle">Cấu hình AI Model</h2>
        <button class="close-modal">&times;</button>
      </div>
      <form id="modelForm" class="modal-body">
        <input type="hidden" id="modelId">
        
        <div class="form-row">
          <div class="form-group half">
            <label for="m-name">Tên hiển thị</label>
            <input type="text" id="m-name" name="name" placeholder="Ví dụ: Gemini 1.5 Pro" required>
          </div>
          <div class="form-group half">
            <label for="m-provider">Nhà cung cấp</label>
            <select id="m-provider" name="provider" required>
              <option value="gemini">Google Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="ollama">Ollama (On-Premise)</option>
              <option value="vllm">vLLM / Khác</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="m-model-name">Technical Model Name</label>
          <input type="text" id="m-model-name" name="llm_model_name" placeholder="Ví dụ: gemini-1.5-pro-latest" required>
        </div>

        <div class="form-group">
          <label for="m-description">Mô tả / Mục đích sử dụng</label>
          <textarea id="m-description" name="description" placeholder="Ghi chú về việc model này dùng để làm gì..." rows="2"></textarea>
        </div>

        <div id="provider-specific-fields">
          <div class="form-group" id="url-group" style="display: none;">
            <label for="m-base-url">Base URL</label>
            <input type="text" id="m-base-url" name="base_url" placeholder="http://192.168.1.100:11434">
          </div>
          <div class="form-group" id="key-group">
            <label for="m-api-key">API Key (nếu có)</label>
            <input type="password" id="m-api-key" name="api_key">
          </div>
        </div>

        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" id="m-active" name="is_active" checked>
            <label for="m-active">Đang hoạt động</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="m-default" name="is_default">
            <label for="m-default">Đặt làm mặc định toàn hệ thống</label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal">Hủy</button>
          <button type="submit" class="btn btn-primary" id="saveModelBtn">Lưu Cấu hình</button>
        </div>
      </form>
    </div>
  </div>
</section>
