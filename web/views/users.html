<!-- ── ADMIN PAGE (REFAC) ── -->
<div class="page" id="page-users">
  <div class="users-content container-xl">
    
    <div class="page-intro">
      <div class="intro-copy">
        <div class="intro-kicker">Administration</div>
        <div class="intro-title">Users & Groups</div>
        <div class="intro-sub">Quản lý tài khoản người dùng, phân quyền truy cập và tổ chức phòng ban.</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Danh sách Users</div>
      <div class="section-actions">
        <button id="admin-refresh-users" class="secondary-btn">🔄 Làm mới</button>
        <button id="admin-add-user" class="primary-btn">+ Thêm User</button>
      </div>
    </div>

    <div class="admin-table-wrapper" style="margin-bottom: 32px;">
      <div id="admin-users-loading" class="loading-overlay" style="display: none;"><span class="spin">🔄</span> Đang tải tài khoản...</div>
      
      <table class="admin-table">
          <thead>
              <tr>
                  <th>Người dùng</th>
                  <th>Email</th>
                  <th>Vai trò</th>
                  <th class="actions-col">Thao tác</th>
              </tr>
          </thead>
          <tbody id="admin-users-tbody">
            <!-- Dynamic Users -->
          </tbody>
      </table>
    </div>

    <div class="section-header" style="margin-top: 40px;">
      <div class="section-title">Groups & Permissions</div>
      <div class="section-actions">
          <button id="admin-refresh-groups" class="secondary-btn">🔄 Làm mới</button>
          <button id="admin-add-group" class="primary-btn">+ Thêm Group</button>
      </div>
    </div>

    <div class="admin-table-wrapper">
      <div id="admin-groups-loading" class="loading-overlay" style="display: none;"><span class="spin">🔄</span> Đang nạp nhóm...</div>
      
      <table class="admin-table">
          <thead>
              <tr>
                  <th>Tên Nhóm</th>
                  <th class="actions-col">Thao tác</th>
              </tr>
          </thead>
          <tbody id="admin-groups-tbody">
            <!-- Dynamic Groups -->
          </tbody>
      </table>
    </div>
  </div>
</div>
