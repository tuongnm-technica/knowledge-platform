<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">&#129504;</div>
      <div>
        <div class="login-logo-text">Knowledge</div>
        <div class="login-logo-sub">On-Premise AI Platform &mdash; Technica</div>
      </div>
    </div>
    <div class="login-title">Đăng nhập</div>
    <div class="login-sub">Nhập thông tin tài khoản Technica của bạn</div>
    <div class="login-error" id="loginError">Email hoặc mật khẩu không đúng</div>
    <div class="login-field">
      <label>EMAIL</label>
      <input id="loginEmail" type="email" placeholder="you@technica.vn" autocomplete="email">
    </div>
    <div class="login-field">
      <label>MẬT KHẨU</label>
      <input id="loginPwd" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
        autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">
      <span id="loginBtnText">Đăng nhập</span>
    </button>
    <div class="login-footer">Technica Internal &mdash; Confidential</div>
  </div>
</div>
