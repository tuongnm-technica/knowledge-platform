<div id="login-screen" x-data="{ lang: (localStorage.getItem('i18nextLng') || 'vi').substring(0, 2) }" @kp-lang-changed.window="lang = $event.detail">
  <div class="login-lang-selector">
    <select onchange="window.changeLanguage(this.value)" x-model="lang" class="login-lang-select">
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="en">🇬🇧 English</option>
      <option value="jp">🇯🇵 日本語</option>
    </select>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">&#129504;</div>
      <div>
        <div class="login-logo-text">Knowledge</div>
        <div class="login-logo-sub">On-Premise AI Platform &mdash; Technica</div>
      </div>
    </div>
    <div class="login-title" x-text="$t('login.title')">Đăng nhập</div>
    <div class="login-sub" x-text="$t('login.sub')">Nhập thông tin tài khoản Technica của bạn</div>
    <div class="login-error" id="loginError" x-text="$t('login.error')">Email hoặc mật khẩu không đúng</div>
    <div class="login-field">
      <label x-text="$t('login.email')">EMAIL</label>
      <input id="loginEmail" type="email" placeholder="you@technica.vn" autocomplete="email">
    </div>
    <div class="login-field">
      <label x-text="$t('login.password')">MẬT KHẨU</label>
      <input id="loginPassword" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
        autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">
      <span id="loginBtnText" x-text="$t('login.btn')">Đăng nhập</span>
    </button>
    <div class="login-footer" x-text="$t('login.footer')">Technica Internal &mdash; Confidential</div>
  </div>
  <button id="loginThemeToggle" class="theme-toggle-login" :title="$t('login.theme_title')">🌓</button>
</div>
