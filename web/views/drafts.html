<!-- ── DRAFTS PAGE ── -->
<div class="page" id="page-drafts" x-data="draftsModule">
  <div class="connectors-content" x-show="!currentDraftId">
    <div class="page-intro">
      <div>
        <div class="intro-kicker">Draft management</div>
        <div class="intro-title">Drafts</div>
        <div class="intro-sub">Danh sách tài liệu nháp do AI sinh ra (lưu trong database). Bạn có thể mở để edit hoặc xóa.</div>
      </div>
      <div class="connectors-toolbar-actions">
        <select class="time-input" x-model="filterType" @change="loadDraftsPage(true)">
          <option value="">All types</option>
          <option value="srs">SRS</option>
          <option value="brd">BRD</option>
          <option value="api_spec">API Spec</option>
          <option value="use_cases">Use Cases</option>
          <option value="validation_rules">Validation Rules</option>
          <option value="user_stories">User Stories</option>
          <option value="fe_spec">FE Spec</option>
          <option value="qa_test_spec">QA Test Spec</option>
          <option value="deployment_spec">Deployment Spec</option>
          <option value="change_request">Change Request</option>
        </select>
        <button class="secondary-btn" @click="loadDraftsPage(true)">Refresh</button>
      </div>
    </div>

    <div class="search-results">
      <div x-show="isLoading" class="drafts-loading">Đang tải...</div>
      <div x-cloak x-show="!isLoading && drafts.length === 0" class="drafts-empty">Chưa có bản nháp nào. Tạo draft từ Chat để bắt đầu.</div>
      
      <div x-cloak x-show="!isLoading && drafts.length > 0" class="drafts-list">
        <template x-for="draft in drafts" :key="draft.id">
          <div class="draft-card">
            <div class="draft-header">
              <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <div class="draft-type" x-text="(draft.doc_type || 'srs').toUpperCase()"></div>
                <div :style="`font-size:10px;padding:4px 10px;border-radius:20px;background:${getStatusColor(draft.status)}15;color:${getStatusColor(draft.status)};font-weight:700;text-transform:uppercase;border:1px solid ${getStatusColor(draft.status)}30`" x-text="draft.status || 'draft'"></div>
              </div>
              <div class="draft-title" x-text="draft.title || 'Untitled'"></div>
            </div>
            <div class="draft-meta">
              <p x-text="(draft.content || '').substring(0, 150) + ((draft.content?.length || 0) > 150 ? '...' : '')"></p>
              <span x-text="'Cập nhật: ' + formatDate(draft.updated_at || draft.created_at)"></span>
            </div>
            <div class="draft-actions">
              <button class="primary-btn mini" style="flex:1; justify-content:center" @click="openDocDraftEditor(draft.id)">📄 Mở Editor</button>
              <button class="secondary-btn mini" @click="deleteDraft(draft.id)" title="Xóa">🗑</button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Draft Editor View -->
  <div class="connectors-content" x-cloak x-show="currentDraftId">
    <div class="draft-editor-wrap" style="height: calc(100vh - 160px);" x-show="currentDraft">
      <div class="draft-editor">
        <div class="draft-editor-header" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <button class="secondary-btn mini btn-back" @click="closeDraftEditor()">← Quay lại</button>
          <span class="draft-type" style="font-size:11px;padding:6px 12px;border-radius:8px" x-text="(currentDraft?.doc_type || 'srs').toUpperCase()"></span>
          <input type="text" x-model="currentDraft.title" style="flex:1;min-width:200px;font-size:18px;font-weight:800;border:none;background:transparent;outline:none;color:var(--text)" placeholder="Tiêu đề...">
          
          <div style="display:flex;align-items:center;gap:8px">
            <select class="time-input" x-model="currentDraft.status" style="font-size:12px;padding:6px 10px;border-radius:10px">
              <option value="draft">Draft</option>
              <option value="review">Đang review</option>
              <option value="approved">Approved</option>
              <option value="published">Published</option>
              <option value="rejected">Rejected</option>
            </select>
            <button class="primary-btn" @click="saveDraft()">💾 Lưu</button>
          </div>
        </div>
        <div class="draft-split-view">
          <textarea id="draftContentEditor" class="draft-textarea" spellcheck="false" x-model="currentDraft.content" placeholder="Nhập nội dung Markdown tại đây..."></textarea>
          <div id="draftContentPreview" class="draft-preview"></div>
        </div>
      </div>
    </div>
  </div>
</div>
