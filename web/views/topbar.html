<div class="topbar" x-data="{ lang: 'vi' }" 
     x-init="lang = (window.i18n?.language || 'vi'); document.addEventListener('kp-lang-changed', (e) => { lang = e.detail; })">
  <div class="page-context">
    <div class="page-eyebrow">Technica Internal</div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="page-title" id="pageTitle">Chat AI</div>
    </div>
  </div>
  <div class="topbar-badge" x-text="$t('common.topbar_badge', { defaultValue: 'Graph-aware retrieval' })">Graph-aware retrieval</div>
  <div class="status-panel">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText" x-text="$t('common.status_connecting')">Đang kết nối...</div>
  </div>
  <div class="language-switcher" style="display: flex; align-items: center;">
    <label style="font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-right: 4px;" x-text="$t('common.language')"></label>
    <select @change="window.changeLanguage($event.target.value)" x-model="lang" class="lang-select">
      <option value="vi">VIE</option>
      <option value="en">ENG</option>
      <option value="jp">JPN</option>
    </select>
  </div>
  <button class="theme-toggle" id="themeToggle" :title="$t('common.toggle_theme', { defaultValue: 'Đổi giao diện' })">🌙</button>
</div>
