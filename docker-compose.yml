services:
# postgres service removed to use local DB


  redis:
    image: redis:7-alpine
    container_name: kp_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kp_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    image: knowledge-platform-core:latest
    container_name: kp_api
    ports:
      - "8000:8000"
    environment:
      # Trỏ kết nối vào các container khác trong mạng nội bộ docker
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - RUN_WORKER=False
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: python run.py

  worker_ingestion:
    image: knowledge-platform-core:latest
    container_name: kp_worker_ingestion
    # Dùng chung environment với API, chỉ ghi đè RUN_WORKER
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - RUN_WORKER=True
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: arq arq_worker.IngestionWorkerSettings

  worker_default:
    image: knowledge-platform-core:latest
    container_name: kp_worker_default
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@host.docker.internal:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - RUN_WORKER=True
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: arq arq_worker.DefaultWorkerSettings

volumes:
  pgdata:
  qdrant_data: