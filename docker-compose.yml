services:
# postgres service removed to use local DB


  redis:
    image: redis:7-alpine
    container_name: kp_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kp_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    image: knowledge-platform-core:latest
    container_name: kp_api
    ports:
      - "8000:8000"
    environment:
      # Trỏ kết nối vào các container khác trong mạng nội bộ docker
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://172.18.0.1:11434
      - PYTHONPATH=/app
      - RAG_SERVICE_URL=http://rag_service:8001
      - RUN_WORKER=False
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: python run.py
    
  rag_service:
    build: .
    image: knowledge-platform-core:latest
    container_name: kp_rag_service
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://172.18.0.1:11434
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      qdrant:
        condition: service_started
    command: uvicorn orchestration.main:app --host 0.0.0.0 --port 8001 --reload

  worker_ingestion:
    image: knowledge-platform-core:latest
    container_name: kp_worker_ingestion
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://172.18.0.1:11434
      - PYTHONPATH=/app
      - RAG_SERVICE_URL=http://rag_service:8001
      - RUN_WORKER=True
      - ARQ_WORKER_TYPE=ingestion
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: python run_worker.py

  worker_default:
    image: knowledge-platform-core:latest
    container_name: kp_worker_default
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://172.18.0.1:11434
      - PYTHONPATH=/app
      - RAG_SERVICE_URL=http://rag_service:8001
      - RUN_WORKER=True
      - ARQ_WORKER_TYPE=default
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: python run_worker.py

  worker_ai:
    image: knowledge-platform-core:latest
    container_name: kp_worker_ai
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - DATABASE_SYNC_URL=postgresql://postgres:Abcd%401234%21@172.18.0.1:5432/knowledge_platform
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://172.18.0.1:11434
      - PYTHONPATH=/app
      - RAG_SERVICE_URL=http://rag_service:8001
      - RUN_WORKER=True
      - ARQ_WORKER_TYPE=ai
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    command: python run_worker.py

  web:
    build: 
      context: ./web
      dockerfile: Dockerfile
    container_name: kp_web
    ports:
      - "3000:80"
    volumes:
      - ./web/dist:/usr/share/nginx/html
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  qdrant_data: